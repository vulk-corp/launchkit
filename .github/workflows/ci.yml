name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm test

  auto-release:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag when missing
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Check if version already on npm
        id: npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@bworlds/launchkit@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already published on npm - skipping publish."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
        if: steps.npm.outputs.already == 'false'
      - run: npm run type-check
        if: steps.npm.outputs.already == 'false'
      - run: npm run build
        if: steps.npm.outputs.already == 'false'
      - run: npm test
        if: steps.npm.outputs.already == 'false'

      - name: Publish
        if: steps.npm.outputs.already == 'false'
        run: npx -y npm@latest publish --provenance --access public
