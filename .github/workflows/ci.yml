name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm test

  auto-release:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release channel
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const version = require('./package.json').version;
          const branch = process.env.GITHUB_REF_NAME;
          const isPrerelease = version.includes('-');

          if (branch === 'main' && isPrerelease) {
            console.error(`main can only publish stable versions. Found ${version}.`);
            process.exit(1);
          }

          if (branch === 'next' && !isPrerelease) {
            console.error(`next can only publish prerelease versions. Found ${version}.`);
            process.exit(1);
          }

          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `version=${version}\n`);
          fs.appendFileSync(output, `tag=v${version}\n`);
          fs.appendFileSync(output, `branch=${branch}\n`);
          fs.appendFileSync(output, `npm_tag=${branch === 'next' ? 'next' : 'latest'}\n`);
          NODE

      - name: Check if version already on npm
        id: npm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "@bworlds/launchkit@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already published on npm - skipping release dispatch."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag when missing
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Dispatch release workflow
        if: steps.npm.outputs.already == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: gh workflow run release.yml --ref "$BRANCH"
