name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm test

      - name: Resolve npm tag
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const version = require('./package.json').version;
          const npmTag = version.includes('-') ? 'next' : 'latest';
          const output = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(output, `version=${version}\n`);
          fs.appendFileSync(output, `npm_tag=${npmTag}\n`);
          NODE

      - name: Check if version already on npm
        id: check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "@bworlds/launchkit@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already published on npm - skipping publish (tag backfill or re-run)."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare trusted publishing
        if: steps.check.outputs.already == 'false'
        run: |
          npm install -g npm@11.5.2
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          sed -i.bak '/_authToken/d' "$npmrc"
          npm --version

      - name: Publish
        if: steps.check.outputs.already == 'false'
        env:
          NPM_TAG: ${{ steps.version.outputs.npm_tag }}
        run: npm publish --access public --tag "$NPM_TAG"
